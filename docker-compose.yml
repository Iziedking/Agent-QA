# Three services on one host: the app, the memory sidecar, and Caddy
# in front. Caddy is the only service exposed to the internet. It terminates
# HTTPS and forwards to the app over the internal network, so the app never
# speaks TLS and never publishes a port to the host. The memory sidecar is
# internal only; the app reaches it at memory:4000.

services:
  app:
    build: .
    restart: unless-stopped
    # No "ports" here on purpose. Only Caddy reaches the app, over the internal
    # network at app:9090.
    expose:
      - "9090"
    # Bound memory and CPU so a burst of slow or large evaluations on this public,
    # unauthenticated endpoint cannot exhaust the host and take Caddy down with it.
    mem_limit: 512m
    cpus: 1.0
    environment:
      # Where the memory sidecar lives. The app degrades gracefully if it is
      # unreachable, so this is a soft dependency.
      - AGENT_MEMORY_URL=http://memory:4000
    depends_on:
      - memory
    # The image defines the HEALTHCHECK; Caddy waits for it before starting.

  memory:
    build: ./memory-svc
    restart: unless-stopped
    expose:
      - "4000"
    # MemWal credentials come from the environment or a gitignored .env file next
    # to this compose file. Without them the sidecar runs but stores nothing, and
    # the app reports memory as unavailable instead of failing.
    environment:
      - MEMWAL_PRIVATE_KEY=${MEMWAL_PRIVATE_KEY:-}
      - MEMWAL_ACCOUNT_ID=${MEMWAL_ACCOUNT_ID:-}
      - MEMWAL_SERVER_URL=${MEMWAL_SERVER_URL:-https://relayer.memwal.ai}
      # Identities this service refuses to serve (comma separated), for
      # retiring a compromised or abandoned identity. Set in the same .env.
      - AGENT_MEMORY_RETIRED_USERS=${AGENT_MEMORY_RETIRED_USERS:-}
      # File storage. WALRUS_SUI_KEY funds Walrus blob writes (primary);
      # ZERO_G_PRIVATE_KEY funds 0G writes (failover). Without either, file
      # endpoints report "not configured" and notes still work.
      - WALRUS_SUI_KEY=${WALRUS_SUI_KEY:-}
      - ZERO_G_PRIVATE_KEY=${ZERO_G_PRIVATE_KEY:-}
    mem_limit: 512m
    cpus: 0.5

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
